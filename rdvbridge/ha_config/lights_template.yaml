- light:
    name: Living Room Led
    unique_id: led_living_room
    state: >
      {{ 'on' if states('light.living_room_led_relay') == 'on'
              or states('light.living_room_1') == 'on' else 'off' }}
    level: "{{ state_attr('light.living_room_1', 'brightness') | int(0) }}"
    hs: "{{ state_attr('light.living_room_1', 'hs_color') or [0, 0] }}"
    turn_on:
      - action: light.turn_on
        target:
          entity_id: light.living_room_led_relay
      - action: light.turn_on
        target:
          entity_id: light.living_room_1
    turn_off:
      - action: light.turn_off
        target:
          entity_id:
            - light.living_room_led_relay
            - light.living_room_1
    set_hs:
      - action: light.turn_on
        target:
          entity_id: light.living_room_led_relay
      - action: light.turn_on
        target:
          entity_id: light.living_room_1
        data:
          hs_color: "{{ hs }}"
          brightness: "{{ (brightness | int) if brightness is defined else omit }}"
    set_level:
      - action: light.turn_on
        target:
          entity_id: light.living_room_led_relay
      - action: light.turn_on
        target:
          entity_id: light.living_room_1
        data:
          brightness: "{{ brightness | int }}"

