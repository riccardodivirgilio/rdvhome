# Sync physical wall switch state to Hue entities for hybrid lights.
# When someone flips the physical switch, the GPIO status pin changes,
# HA polls it and updates the relay entity. These automations then mirror
# that state change to the paired Hue light so everything stays in sync.

- id: sync_led_kitchen_hue
  alias: "Sync Kitchen LED relay → Hue"
  trigger:
    - platform: state
      entity_id: light.kitchen_led_relay
  action:
    - choose:
        - conditions:
            - condition: state
              entity_id: light.kitchen_led_relay
              state: "on"
          sequence:
            - service: light.turn_on
              target:
                entity_id: light.hue_kitchen_led
        - conditions:
            - condition: state
              entity_id: light.kitchen_led_relay
              state: "off"
          sequence:
            - service: light.turn_off
              target:
                entity_id: light.hue_kitchen_led

