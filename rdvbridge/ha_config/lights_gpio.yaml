# GPIO-only spotlight lights (pulse-toggle relay)
# These are the physical spotlights controlled via RPi GPIO relays.

- platform: rdv_gpio
  name: Kitchen Light
  unique_id: spotlight_kitchen
  gpio_relay: 24
  gpio_status: 17

- platform: rdv_gpio
  name: Living Room Light
  unique_id: spotlight_living_room
  gpio_relay: 23
  gpio_status: 2

- platform: rdv_gpio
  name: TV Light
  unique_id: spotlight_tv
  gpio_relay: 15
  gpio_status: 25

- platform: rdv_gpio
  name: Entrance Light
  unique_id: spotlight_entrance
  gpio_relay: 18
  gpio_status: 7

- platform: rdv_gpio
  name: Bedroom Light
  unique_id: spotlight_bedroom
