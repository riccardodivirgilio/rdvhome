# These are the GPIO halves of hybrid lights.
# They are hidden (entity_category: diagnostic would work, but we use template lights
# as the user-facing entities instead — see lights_template.yaml).
# Prefixed with "relay_" so they don't clutter the UI.

- platform: rdv_gpio
  name: Living Room LED Relay
  unique_id: relay_led_living_room
  gpio_relay: 20
  gpio_status: 4

- platform: rdv_gpio
  name: Bedroom LED Relay
  unique_id: relay_led_bedroom
  gpio_relay: 14
  gpio_status: 8
